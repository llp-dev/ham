name: Weekly Release

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: perl:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CPAN dependencies
        run: cpanm --notest PAR::Packer Git::Repository LWP::UserAgent URI XML::Parser

      - name: Build ham.pl
        run: make

      - uses: actions/upload-artifact@v4
        with:
          name: ham.pl
          path: ham.pl

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ham.pl

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="weekly-$(date -u +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Weekly build $TAG"
          git push origin "$TAG"
          gh release create "$TAG" ham.pl \
            --title "Weekly Build $TAG" \
            --generate-notes
